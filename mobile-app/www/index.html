<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a4a7a">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/png" href="./assets/icon-1024.png">
<title>WzZzZ</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue:       #1a4a7a;
  --blue-mid:   #2563a8;
  --blue-light: #e8f1fb;
  --blue-pale:  #f0f6ff;
  --teal:       #0f7d6b;
  --teal-light: #e0f5f0;
  --amber:      #b86a00;
  --amber-light:#fff3e0;
  --red:        #c0392b;
  --red-light:  #fdecea;
  --purple:     #5a3fa0;
  --purple-light:#f0ebff;
  --green:      #27632a;
  --green-light:#e8f5e9;
  --gray:       #6b7280;
  --gray-light: #f5f6f8;
  --border:     #e4e8ee;
  --text:       #1a2233;
  --text-sec:   #6b7280;
  --white:      #ffffff;
  --radius:     14px;
  --radius-sm:  8px;
  --shadow:     0 2px 12px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Cairo', sans-serif;
  background: #eef1f6;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100dvh;
  padding: 8px;
}

/* â”€â”€ Phone Shell â”€â”€ */
.phone-shell {
  width: min(393px, calc(100vw - 16px));
  height: min(851px, calc(100dvh - 16px));
  background: var(--white);
  border-radius: 40px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.06);
  position: relative;
  display: flex;
  flex-direction: column;
}

/* â”€â”€ Status Bar â”€â”€ */

/* â”€â”€ Pages â”€â”€ */
.page { display: none; flex-direction: column; flex: 1; overflow: hidden; min-height: 0; }
.page.active { display: flex; }

/* â”€â”€ Nav Header â”€â”€ */
.nav-header {
  background: var(--blue);
  padding: 16px 20px 18px;
  flex-shrink: 0;
}
.nav-header .back-btn {
  color: rgba(255,255,255,0.65);
  font-size: 13px;
  cursor: pointer;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.nav-header .back-btn svg {
  width: 14px;
  height: 14px;
}
.nav-header h1 { color: #fff; font-size: 20px; font-weight: 700; }
.nav-header p  { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 2px; }

/* â”€â”€ Bottom Nav â”€â”€ */
.bottom-nav {
  background: var(--white);
  border-top: 1px solid var(--border);
  display: flex;
  flex-shrink: 0;
  padding: 8px 0 calc(16px + env(safe-area-inset-bottom, 0px));
  margin-top: auto;
  position: relative;
  z-index: 8;
}
.bn-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  padding: 6px 0;
}
.bn-item svg { width: 22px; height: 22px; }
.bn-item span { font-size: 11px; color: var(--text-sec); font-weight: 500; }
.bn-item.active span { color: var(--blue-mid); }
.bn-item.active svg { color: var(--blue-mid); }
.bn-icon { color: var(--gray); }
.bn-icon-active { color: var(--blue-mid); }

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   PAGE 1 â€” HOME DASHBOARD
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
#page-home .home-header {
  background: var(--blue);
  padding: 36px 20px 24px;
}
.home-identity {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}
.doctor-mark {
  width: 56px;
  height: 56px;
  border-radius: 20px;
  background: linear-gradient(180deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.1) 100%);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18), 0 10px 22px rgba(7, 29, 58, 0.18);
  flex-shrink: 0;
}
.doctor-mark svg {
  width: 28px;
  height: 28px;
}
.doctor-copy {
  min-width: 0;
}
.doctor-name {
  color: #fff;
  font-size: 24px;
  font-weight: 800;
  margin-top: 0;
  line-height: 1.2;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.doctor-heart {
  color: #ff5a6b;
  font-size: 18px;
  line-height: 1;
  text-shadow: 0 4px 10px rgba(255,90,107,0.28);
}
.header-top-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.icon-action-btn {
  width: 42px;
  height: 42px;
  border: none;
  border-radius: 14px;
  background: rgba(255,255,255,0.16);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.14);
}
.icon-action-btn svg {
  width: 18px;
  height: 18px;
}
.next-apt-card {
  background: rgba(255,255,255,0.13);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-top: 14px;
  border: 1px solid rgba(255,255,255,0.15);
}
.next-apt-card .lbl { color: rgba(255,255,255,0.55); font-size: 11px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.next-apt-card .name { color: #fff; font-size: 15px; font-weight: 600; }
.next-apt-card .detail { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 3px; }
.home-body { padding: 20px; flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.stat-card {
  background: linear-gradient(180deg, #ffffff 0%, #fafcff 100%);
  border-radius: 18px;
  padding: 14px;
  border: 1px solid rgba(26,74,122,0.08);
  min-height: 96px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: center;
  column-gap: 12px;
  box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
}
.stat-card-head {
  display: flex;
  justify-content: center;
  align-self: start;
}
.stat-icon {
  width: 32px;
  height: 32px;
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(37,99,168,0.08);
  color: var(--blue-mid);
}
.stat-icon svg {
  width: 17px;
  height: 17px;
}
.stat-copy {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: center;
  min-height: 100%;
}
.stat-card .num { font-size: 38px; font-weight: 800; color: var(--text); line-height: 0.95; }
.stat-card .stat-lbl { font-size: 12px; color: var(--text-sec); margin-top: 6px; text-align: right; }
.stat-card.blue .num { color: var(--blue-mid); }
.stat-card.green .num { color: var(--teal); }
.stat-card.green .stat-icon {
  background: rgba(15,125,107,0.1);
  color: var(--teal);
}
.section-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
.apt-list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.apt-list-item:last-child { border-bottom: none; }
.apt-time { font-size: 12px; color: var(--text-sec); width: 40px; flex-shrink: 0; text-align: center; }
.apt-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.apt-info { flex: 1; }
.apt-name { font-size: 14px; font-weight: 600; color: var(--text); }
.apt-type { font-size: 12px; color: var(--text-sec); margin-top: 1px; }
.apt-badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 20px;
  font-weight: 500;
}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   PAGE 2 â€” PATIENT LIST
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
#page-patients .search-bar {
  background: var(--blue);
  padding: 0 20px 18px;
}
.nav-header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.header-plus-btn {
  width: 42px;
  height: 42px;
  border: none;
  border-radius: 16px;
  background: rgba(255,255,255,0.18);
  color: #fff;
  display: grid;
  place-items: center;
  cursor: pointer;
  flex-shrink: 0;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2), 0 10px 20px rgba(7, 29, 58, 0.16);
}
.header-plus-btn svg {
  width: 20px;
  height: 20px;
}
.header-actions-stack {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: stretch;
  flex-shrink: 0;
}
.header-settings-btn {
  width: 42px;
  height: 42px;
  border: none;
  border-radius: 16px;
  background: rgba(255,255,255,0.14);
  color: #fff;
  display: grid;
  place-items: center;
  cursor: pointer;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
}
.header-settings-btn svg {
  width: 18px;
  height: 18px;
}
.settings-popover {
  position: absolute;
  top: 0;
  left: 54px;
  width: 198px;
  background: rgba(255,255,255,0.98);
  border: 1px solid rgba(26,74,122,0.1);
  border-radius: 18px;
  padding: 12px;
  box-shadow: 0 22px 44px rgba(15, 23, 42, 0.18);
  color: var(--text);
  z-index: 20;
}
.settings-popover-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}
.settings-item {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.settings-label {
  font-size: 11px;
  color: var(--text-sec);
}
.settings-options {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.settings-option {
  border: 1px solid rgba(26,74,122,0.08);
  border-radius: 12px;
  background: #f8fbff;
  min-height: 40px;
  padding: 0 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
}
.settings-option.active {
  background: rgba(37,99,168,0.08);
  border-color: rgba(37,99,168,0.22);
  color: var(--blue-mid);
  font-weight: 700;
}
.settings-check svg {
  width: 16px;
  height: 16px;
}
.search-input-wrap {
  background: rgba(255,255,255,0.15);
  border-radius: 12px;
  display: flex;
  align-items: center;
  padding: 10px 14px;
  gap: 8px;
  border: 1px solid rgba(255,255,255,0.2);
}
.search-input-wrap input {
  background: none;
  border: none;
  outline: none;
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  flex: 1;
  direction: rtl;
}
.search-input-wrap input::placeholder { color: rgba(255,255,255,0.5); }
.search-input-wrap svg { color: rgba(255,255,255,0.6); flex-shrink: 0; }
.patient-search-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}
.patient-search-field {
  min-width: 0;
}
.patient-search-field .search-input-wrap {
  padding: 8px 10px;
}
.patient-search-field input {
  min-width: 0;
  font-size: 13px;
}
.patients-list { padding: 16px 20px; flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
.patient-card {
  display: grid;
  grid-template-columns: 52px 1fr auto;
  align-items: center;
  gap: 14px;
  padding: 15px;
  background: linear-gradient(180deg, #ffffff 0%, #fbfcff 100%);
  border-radius: 18px;
  border: 1px solid rgba(26,74,122,0.08);
  margin-bottom: 12px;
  cursor: pointer;
  transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 14px 30px rgba(15, 23, 42, 0.06);
}
.patient-card:active { background: var(--gray-light); transform: translateY(1px); }
.patient-avatar {
  width: 52px; height: 52px;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700;
  flex-shrink: 0;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.55);
}
.patient-info { min-width: 0; }
.patient-name { font-size: 15px; font-weight: 700; color: var(--text); }
.patient-meta { font-size: 12px; color: var(--text-sec); margin-top: 3px; line-height: 1.5; }
.patient-status {
  font-size: 11px; padding: 5px 10px;
  border-radius: 999px; font-weight: 600; flex-shrink: 0;
  align-self: start;
}
.status-active { background: var(--green-light); color: var(--green); }
.status-pending { background: var(--amber-light); color: var(--amber); }
.add-patient-btn {
  margin: 0 20px 16px;
  background: var(--blue-mid);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 14px;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  width: calc(100% - 40px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   PAGE 3 â€” PATIENT PROFILE
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
.patient-profile-header {
  background: var(--blue);
  padding: 0 20px 20px;
}
.profile-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}
.profile-av {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff;
  border: 2px solid rgba(255,255,255,0.3);
  flex-shrink: 0;
}
.profile-av-name { color: #fff; font-size: 17px; font-weight: 700; }
.profile-av-id   { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 2px; }
.profile-badge   { background: rgba(39,179,130,0.25); color: #4fe09e; font-size: 11px; padding: 3px 10px; border-radius: 20px; display: inline-block; margin-top: 4px; }
.profile-mini-stats {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}
.mini-stat {
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 8px 10px;
  border: 1px solid rgba(255,255,255,0.12);
}
.mini-stat .ml { color: rgba(255,255,255,0.5); font-size: 10px; }
.mini-stat .mv { color: #fff; font-size: 13px; font-weight: 600; margin-top: 2px; }
.mini-stat-button {
  font-family: 'Cairo', sans-serif;
  text-align: right;
  cursor: pointer;
  appearance: none;
}
.mini-stat-button.is-settled {
  background: rgba(39,179,130,0.22);
  border-color: rgba(79,224,158,0.28);
}
.mini-stat-button.is-due {
  background: rgba(184,106,0,0.24);
  border-color: rgba(255,214,102,0.24);
}
.mini-stat-button.is-settled .ml,
.mini-stat-button.is-settled .mv {
  color: #eafff4;
}
.mini-stat-button.is-due .ml,
.mini-stat-button.is-due .mv {
  color: #fff6da;
}

/* Profile Tabs */
.profile-tabs {
  display: flex;
  background: var(--blue);
  border-bottom: none;
  flex-shrink: 0;
  overflow-x: auto;
}
.p-tab {
  flex: 1 0 auto;
  min-width: 88px;
  padding: 11px 4px;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  border-bottom: 2.5px solid transparent;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.p-tab.active { color: #fff; border-bottom-color: #5bc4ff; }
.tab-content { display: none; padding: 16px 20px; flex: 1; min-height: 0; }
.tab-content.active { display: block; }

/* Info rows */
.info-section-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-sec);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 16px 0 8px;
}
.info-section-title:first-child { margin-top: 0; }
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 13px; color: var(--text-sec); }
.info-value { font-size: 13px; font-weight: 600; color: var(--text); text-align: left; }
.info-value.link  { color: var(--blue-mid); }
.info-value.warn  { color: var(--red); }
.info-edit-field {
  display: block;
  margin-bottom: 12px;
}
.info-input {
  width: 100%;
  margin-top: 6px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--gray-light);
  padding: 12px 14px;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  color: var(--text);
}
.profile-action-row {
  display: flex;
  gap: 10px;
  padding: 14px 20px 8px;
  flex-shrink: 0;
}
.btn-primary {
  flex: 1; background: var(--blue-mid); color: #fff;
  border: none; border-radius: var(--radius); padding: 13px;
  font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; text-align: center;
}
.btn-secondary {
  flex: 1; background: var(--gray-light); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--radius); padding: 13px;
  font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; text-align: center;
}
.btn-danger {
  flex: 1;
  background: #f2645a;
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 13px;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
}
.account-section { padding: 16px 20px 24px; }
.account-summary {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.account-card {
  background: linear-gradient(180deg, #ffffff 0%, #fbfcff 100%);
  border: 1px solid rgba(26,74,122,0.08);
  border-radius: 16px;
  padding: 14px;
  box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
}
.account-card strong {
  display: block;
  font-size: 18px;
  color: var(--text);
  font-weight: 700;
}
.account-card span {
  display: block;
  margin-top: 4px;
  font-size: 12px;
  color: var(--text-sec);
}
.account-card.settled {
  background: linear-gradient(180deg, #edf9f2 0%, #e3f6ea 100%);
  border-color: rgba(39,179,130,0.25);
}
.account-card.pending {
  background: linear-gradient(180deg, #fff8eb 0%, #fff2d6 100%);
