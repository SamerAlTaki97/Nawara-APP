name: Build Android Release APK

on:
  workflow_dispatch:

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Capacitor CLI in this project requires Node 22+
          node-version: 22
          cache: npm
          cache-dependency-path: mobile-app/package.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Capacitor Android build here targets Java 21
          java-version: 21

      - name: Install mobile dependencies
        working-directory: mobile-app
        run: npm install

      - name: Sync mobile web assets
        working-directory: mobile-app
        shell: pwsh
        run: ./scripts/sync-web-assets.ps1

      - name: Add Android platform if missing
        working-directory: mobile-app
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android project
        working-directory: mobile-app
        run: npx cap sync android

      - name: Install Android launcher icons
        working-directory: mobile-app
        shell: pwsh
        run: ./scripts/install-android-icons.ps1

      - name: Decode signing keystore
        working-directory: mobile-app/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > wzzzzz-release.jks

      - name: Write keystore.properties
        working-directory: mobile-app/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat <<EOF > keystore.properties
          # Keystore is decoded into mobile-app/android/, while Gradle reads this from android/app/
          storeFile=../wzzzzz-release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Configure Android signing
        working-directory: mobile-app
        run: python ./scripts/configure-android-signing.py

      - name: Build signed release APK
        working-directory: mobile-app/android
        run: ./gradlew assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WzZzZ-release-apk
          path: mobile-app/android/app/build/outputs/apk/release/*.apk
